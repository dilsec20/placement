<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Dashboard — Placement Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-base: #05050A;
    --bg-panel: rgba(255, 255, 255, 0.02);
    --bg-hover: rgba(255, 255, 255, 0.05);
    
    --text-primary: #FFFFFF;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    
    --accent: #6366F1;
    --accent-glow: rgba(99, 102, 241, 0.4);
    --accent-2: #14B8A6;
    
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(255, 255, 255, 0.15);
    --border-focus: rgba(99, 102, 241, 0.5);
    
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-xl: 32px;
    
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* Ambient Glow Background */
.bg-glow-1, .bg-glow-2 {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    z-index: -1;
    pointer-events: none;
}
.bg-glow-1 {
    width: 600px; height: 600px;
    background: var(--accent);
    top: -200px; left: -100px;
}
.bg-glow-2 {
    width: 500px; height: 500px;
    background: var(--accent-2);
    bottom: -150px; right: -100px;
    opacity: 0.3;
}

/* App Layout */
.app-container {
    display: flex;
    height: 100vh;
    width: 100vw;
}

/* === SIDEBAR === */
.sidebar {
    width: 300px;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
}

.sidebar-header {
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
}

.logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #A855F7);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: white;
    box-shadow: 0 4px 20px var(--accent-glow);
}

.title-group h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
.title-group p { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }

.global-progress-card {
    margin: 24px;
    padding: 20px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 16px;
}

.progress-ring-wrap {
    position: relative;
    width: 64px; height: 64px;
}
.progress-ring { transform: rotate(-90deg); }
.progress-ring circle {
    fill: transparent;
    stroke-width: 6;
}
.progress-ring-bg { stroke: rgba(255,255,255,0.1); }
.progress-ring-fill {
    stroke: url(#gradient);
    stroke-linecap: round;
    stroke-dasharray: 176; /* 2 * pi * 28 */
    stroke-dashoffset: 176;
    transition: stroke-dashoffset 1s ease-out;
}

.progress-text-inner {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1rem;
}

.progress-info h3 { font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); }
.progress-info p { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

.nav-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    font-weight: 600;
    padding: 0 24px 12px;
}

.topic-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 24px;
}
.topic-nav::-webkit-scrollbar { width: 4px; }
.topic-nav::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

.nav-btn {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 12px 16px;
    margin-bottom: 4px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    display: flex; justify-content: space-between; align-items: center;
}
.nav-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
}
.nav-btn.active {
    background: rgba(99, 102, 241, 0.15);
    color: #818CF8;
    border-left: 3px solid var(--accent);
}
.nav-btn-perc {
    font-size: 0.75rem;
    background: var(--bg-panel);
    padding: 2px 6px;
    border-radius: 12px;
}
.nav-btn.active .nav-btn-perc { background: rgba(99,102,241,0.2); }

/* === MAIN CONTENT === */
.main-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

/* Top Header */
.top-header {
    height: 80px;
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(5, 5, 10, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 5;
}

.search-box {
    position: relative;
    width: 400px;
}
.search-box svg {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-muted);
}
.search-box input {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 12px 16px 12px 44px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.95rem;
    transition: var(--transition);
    outline: none;
}
.search-box input:focus {
    background: rgba(255,255,255,0.05);
    border-color: var(--border-focus);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

.stat-pills { display: flex; gap: 12px; }
.pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-panel); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: var(--radius-xl);
    font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);
}
.pill-value { color: var(--text-primary); font-weight: 600; }

/* Scrollable Content Area */
.content-area {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    position: relative;
}
.content-area::-webkit-scrollbar { width: 8px; }
.content-area::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

/* Hero Banner */
.hero-banner {
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.05));
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
}
.hero-icon {
    width: 80px; height: 80px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.hero-info { flex: 1; }
.hero-title {
    font-size: 2rem; font-weight: 700; margin-bottom: 12px;
    background: linear-gradient(135deg, #FFF, #94A3B8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-bar-wrap {
    height: 6px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden;
    margin-bottom: 8px; max-width: 400px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.hero-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.hero-desc { font-size: 0.9rem; color: var(--text-secondary); }

/* Links Grid (Glass Cards) */
.links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
}
.sub-section-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 32px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.sub-section-title::before {
    content: '';
    width: 24px; height: 2px;
    background: var(--border-hover);
}
.link-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px;
    display: flex; cursor: pointer; text-decoration: none;
    align-items: flex-start; gap: 12px;
    backdrop-filter: blur(10px);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}
.link-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(to bottom, var(--accent), #A855F7);
    opacity: 0; transition: var(--transition);
}
.link-card:hover {
    transform: translateY(-4px) scale(1.01);
    background: rgba(255,255,255,0.04);
    border-color: var(--border-hover);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}
.link-card:hover::before { opacity: 1; }

/* Checkbox */
.checkbox-wrap {
    width: 24px; height: 24px;
    border: 2px solid var(--border-hover);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: var(--transition);
    background: rgba(0,0,0,0.2);
}
.checkbox-wrap svg {
    width: 14px; height: 14px; color: white;
    opacity: 0; transform: scale(0.5); transition: var(--transition);
    stroke-width: 3;
}
.link-card.done .checkbox-wrap {
    background: var(--accent);
    border-color: var(--accent);
}
.link-card.done .checkbox-wrap svg { opacity: 1; transform: scale(1); }

.link-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; min-height: 24px; }
.link-title {
    font-size: 0.95rem; font-weight: 500; color: var(--text-primary);
    line-height: 1.4; margin-bottom: 4px; transition: color 0.2s;
}
.link-card:hover .link-title { color: #FFF; }
.link-url {
    font-size: 0.75rem; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: inline-flex; align-items: center; gap: 4px;
}
.link-platform {
    background: rgba(255,255,255,0.05);
    padding: 2px 8px; border-radius: 12px;
    text-transform: capitalize; font-size: 0.7rem;
    font-weight: 600; color: var(--text-secondary);
}

/* Responsive */
@media (max-width: 900px) {
    .sidebar { width: 260px; }
}
@media (max-width: 768px) {
    .app-container { flex-direction: column; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: 300px; }
    .top-header { padding: 0 20px; }
    .search-box { width: 250px; }
    .content-area { padding: 20px; }
}
</style>
</head>

function getSource(url) {
    try { 
        let h = new URL(url).hostname.replace('www.','').replace('.com','').replace('.org','').replace('.io','');
        return h.split('.')[0]; 
    } catch(e) { return 'link'; }
}

// 2. Parser Logic from original Modern Sheet implementation
function parseBookmarks(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    
    const allDLs = doc.querySelectorAll('dl');
    let rootDL = null;
    const allH3s = doc.querySelectorAll('h3');
    for(const h3 of allH3s){
        if(h3.textContent.trim() === 'DSA Sheet'){
            const next = h3.parentElement?.nextElementSibling;
            if(next && next.tagName === 'DL') rootDL = next;
            break;
        }
    }
    if(!rootDL) rootDL = allDLs[allDLs.length > 2 ? 2 : 0];
    if(!rootDL) return [];

    function parseDL(dl, depth=0){
        const items = [];
        const children = dl.children;
        for(let i=0; i<children.length; i++){
            const el = children[i];
            if(el.tagName !== 'DT') continue;
            const h3 = el.querySelector(':scope > h3');
            const a = el.querySelector(':scope > a');
            if(h3){
                const nextDL = el.nextElementSibling;
                let subItems = [];
                if(nextDL && nextDL.tagName === 'DL'){ subItems = parseDL(nextDL, depth+1); }
                const innerDL = el.querySelector(':scope > dl');
                if(innerDL && innerDL !== nextDL){ subItems = subItems.concat(parseDL(innerDL, depth+1)); }
                items.push({type:'folder', name:h3.textContent.trim(), children:subItems, depth});
            } else if(a){
                items.push({type:'link', name:a.textContent.trim(), url:a.getAttribute('href')});
            }
        }
        return items;
    }

    const topItems = [];
    let currentDT = rootDL.firstElementChild;
    while(currentDT){
        if(currentDT.tagName === 'DT'){
            const h3 = currentDT.querySelector(':scope > h3');
            const a = currentDT.querySelector(':scope > a');
            if(h3){
                let assocDL = currentDT.nextElementSibling;
                if(assocDL && assocDL.tagName !== 'DL') assocDL = null;
                if(!assocDL){
                    for(let c of currentDT.children) if(c.tagName === 'DL'){assocDL = c; break;}
                }
                const kids = assocDL ? parseDL(assocDL, 1) : [];
                topItems.push({type:'folder', name:h3.textContent.trim(), children:kids, depth:0});
            } else if(a){
                topItems.push({type:'link', name:a.textContent.trim(), url:a.getAttribute('href')});
            }
        }
        currentDT = currentDT.nextElementSibling;
    }
    return topItems;
}

const STORAGE_KEY = 'dsa_sheet_modern_done';
function getDone() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e) { return {}; } }
function setDone(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function processData() {
    const topItems = parseBookmarks(RAW_HTML);
    // Handle nesting if top item is solitary wrapper
    if(topItems.length === 1 && topItems[0].type === 'folder'){
        let inner = topItems[0].children || [];
        if(inner.length === 1 && inner[0].name === 'DSA Sheet') inner = inner[0].children;
        treeData = inner;
    } else {
        treeData = topItems;
    }
    
    // Extract linear list of topics and index problems
    treeData.forEach((topic, idx) => {
        topic.icon = ICONS[idx % ICONS.length];
        const flatLinks = [];
        function extractLinks(node) {
            if(node.type === 'link') flatLinks.push(node);
            if(node.children) node.children.forEach(extractLinks);
        }
        extractLinks(topic);
        topic.allLinksList = flatLinks;
        allLinks = allLinks.concat(flatLinks);
    });
}

// 4. Rendering
function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    
    // "All Topics" button
    const allBtn = document.createElement('button');
    allBtn.className = 'nav-btn';
    if(activeTopicIndex === -1) allBtn.classList.add('active');
    allBtn.innerHTML = `<span><span style="font-size:1.2rem;margin-right:8px;">🔥</span> All Problems</span> <span class="nav-btn-perc" id="btn-perc-all"></span>`;
    allBtn.onclick = () => selectTopic(-1);
    nav.appendChild(allBtn);

    treeData.forEach((topic, idx) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        if(activeTopicIndex === idx) btn.classList.add('active');
        btn.innerHTML = `<span><span style="font-size:1.2rem;margin-right:8px;">${topic.icon}</span> ${topic.name.substring(0, 20)}${topic.name.length>20?'..':''}</span> <span class="nav-btn-perc" id="btn-perc-${idx}"></span>`;
        btn.onclick = () => selectTopic(idx);
        nav.appendChild(btn);
    });
    
    updateGlobalStats();
}

function renderTopicContent(topicIdx, searchQuery = "") {
    const container = document.getElementById('problems-container');
    const hero = document.getElementById('hero-banner');
    container.innerHTML = '';

    const isAll = (topicIdx === -1);
    const renderList = (isAll && !searchQuery) ? treeData : (searchQuery ? searchAllGlobal(searchQuery) : [treeData[topicIdx]]);
    
    if(!searchQuery && !isAll) {
        // Show Hero for specific category
        hero.style.display = 'flex';
        const topic = treeData[topicIdx];
        document.getElementById('hero-title').textContent = topic.name;
        document.getElementById('hero-icon').textContent = topic.icon;
        updateHeroStats(topicIdx);
    } else {
        hero.style.display = 'none';
        if(searchQuery) {
            const stitle = document.createElement('h3');
            stitle.className = 'sub-section-title';
            stitle.style.marginTop = '0';
            stitle.textContent = `Search Results for "${searchQuery}"`;
            container.appendChild(stitle);
        }
    }

    // Render nodes
    renderList.forEach(topicNode => {
        if(searchQuery) {
            // Already filtered in searchAllGlobal
            renderLinksGrid(topicNode.links, container, topicNode.name);
        } else {
            if(isAll){
                // Just flatten folders to grids to avoid deep nesting UI in overview
                renderLinksGrid(topicNode.allLinksList, container, topicNode.name);
            } else {
                // Recursive render to maintain subsections
                renderSubFolders(topicNode, container, true);
            }
        }
    });
}

function renderSubFolders(node, container, isRoot=false) {
    if(!isRoot && node.type === 'folder' && node.children && node.children.length > 0) {
        // Sub-section label
        const title = document.createElement('div');
        title.className = 'sub-section-title';
        title.textContent = node.name;
        container.appendChild(title);
    }

    let immediateLinks = [];
    if(node.children) {
        node.children.forEach(child => {
            if(child.type === 'link') immediateLinks.push(child);
            else renderSubFolders(child, container);
        });
    }
    if(immediateLinks.length > 0) {
        renderLinksGrid(immediateLinks, container);
    }
}

function renderLinksGrid(linksList, container, titleText="") {
    if(linksList.length === 0) return;
    if(titleText) {
        const t = document.createElement('div');
        t.className = 'sub-section-title';
        t.textContent = titleText;
        container.appendChild(t);
    }
    
    const grid = document.createElement('div');
    grid.className = 'links-grid';
    const doneMap = getDone();
    
    linksList.forEach(link => {
        const key = link.url || link.name;
        const isDone = !!doneMap[key];
        const card = document.createElement('a');
        card.className = `link-card ${isDone ? 'done' : ''}`;
        card.href = link.url;
        card.target = "_blank";
        
        card.innerHTML = `
            <div class="checkbox-wrap">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </div>
            <div class="link-content">
                <div class="link-title">${link.name}</div>
                <div class="link-url">
                    <span class="link-platform">${getSource(link.url)}</span>
                </div>
            </div>
        `;
        
        // Handle checkbox click
        const chk = card.querySelector('.checkbox-wrap');
        chk.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            const d = getDone();
            if(d[key]){
                delete d[key];
                card.classList.remove('done');
            } else {
                d[key] = 1;
                card.classList.add('done');
            }
            setDone(d);
            updateGlobalStats();
            if(activeTopicIndex !== -1) updateHeroStats(activeTopicIndex);
        });
        
        grid.appendChild(card);
    });
    container.appendChild(grid);
}

function searchAllGlobal(q) {
    const res = [];
    treeData.forEach(topic => {
        const matches = topic.allLinksList.filter(l => l.name.toLowerCase().includes(q) || (l.url && l.url.toLowerCase().includes(q)));
        if(matches.length > 0) {
            res.push({ name: topic.name, links: matches });
        }
    });
    return res;
}

// 5. Interactions & Stats Update
function selectTopic(idx) {
    activeTopicIndex = idx;
    document.getElementById('searchInput').value = '';
    renderSidebar();
    renderTopicContent(idx);
    document.getElementById('content-area').scrollTo(0,0);
}

function updateGlobalStats() {
    const doneMap = getDone();
    let totalDone = 0;
    
    treeData.forEach((topic, idx) => {
        let count = 0;
        topic.allLinksList.forEach(l => {
            if(doneMap[l.url || l.name]) count++;
        });
        totalDone += count;
        
        // Update sidebar percents
        const percLabel = document.getElementById(`btn-perc-${idx}`);
        if(percLabel){
            percLabel.textContent = `${count}/${topic.allLinksList.length}`;
            percLabel.style.color = count === topic.allLinksList.length ? '#10B981' : (count>0?'#38BDF8':'inherit');
        }
    });
    
    // Overall percent
    const allPercLabel = document.getElementById(`btn-perc-all`);
    if(allPercLabel) allPercLabel.textContent = `${totalDone}/${allLinks.length}`;

    const pt = totalDone / (allLinks.length || 1);
    document.getElementById('global-done').textContent = totalDone;
    document.getElementById('global-total').textContent = allLinks.length;
    document.getElementById('global-perc').textContent = Math.round(pt * 100) + '%';
    
    const ring = document.getElementById('global-ring');
    const circum = 176;
    ring.style.strokeDashoffset = circum - (pt * circum);
    
    document.getElementById('top-topics').textContent = treeData.length;
    document.getElementById('top-comp').textContent = Math.round(pt * 100) + '%';
}

function updateHeroStats(idx) {
    const doneMap = getDone();
    const topic = treeData[idx];
    let count = 0;
    topic.allLinksList.forEach(l => {
        if(doneMap[l.url || l.name]) count++;
    });
    const pt = count / (topic.allLinksList.length || 1);
    
    document.getElementById('hero-desc').textContent = `${count} / ${topic.allLinksList.length} problems completed`;
    document.getElementById('hero-bar-fill').style.width = (pt * 100) + '%';
}

// Setup Events
document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    if(q) {
        renderTopicContent(-1, q);
    } else {
        renderTopicContent(activeTopicIndex);
    }
});

// INIT
processData();
renderSidebar();
renderTopicContent(-1); // default to 'All Overview'
</script>
